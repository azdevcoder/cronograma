<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AzDev Cronograma</title>
    <style>
        :root {
            --bg: #0b0d12; --card: #161b22; --accent: #00e5ff;
            --text: #e6edf3; --border: #30363d; --danger: #f85149;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 20px; }

        .container { max-width: 1600px; margin: 0 auto; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        
        button { cursor: pointer; border-radius: 6px; border: none; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: #000; padding: 10px 20px; }
        .btn-danger { background: var(--danger); color: white; padding: 8px 15px; }
        
        /* Grid */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-column { background: #0d1117; border: 1px solid var(--border); border-radius: 8px; min-height: 400px; }
        .day-header { background: var(--card); padding: 12px; text-align: center; color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: bold; }

        .task-card { 
            background: var(--card); margin: 8px; padding: 10px; border-radius: 6px; 
            border-left: 4px solid var(--border); cursor: pointer; position: relative;
        }
        .task-card:hover { transform: translateY(-2px); border-left-color: var(--accent); }
        .task-time { font-size: 0.75rem; color: #8b949e; display: block; }
        .task-name { font-size: 0.9rem; font-weight: 600; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 10; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 6px; }

        @media (max-width: 1000px) { .calendar-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <h2>Cronograma Semanal</h2>
        <button class="btn-primary" onclick="openModal()">+ Nova Atividade</button>
    </div>
    
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="modal" id="taskModal">
    <div class="modal-content">
        <h3 id="modalTitle">Cadastrar Atividade</h3>
        <input type="hidden" id="editIndex">
        <label>Dia da Semana</label>
        <select id="dayInput">
            <option value="0">Domingo</option><option value="1">Segunda</option>
            <option value="2">Terça</option><option value="3">Quarta</option>
            <option value="4">Quinta</option><option value="5">Sexta</option>
            <option value="6">Sábado</option>
        </select>
        <label>Horário</label>
        <input type="time" id="timeInput">
        <label>Atividade</label>
        <input type="text" id="taskInput" placeholder="Descreva a Atividade">
        
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button class="btn-primary" style="flex: 2" onclick="saveTask()">Salvar</button>
            <button id="deleteBtn" class="btn-danger" style="flex: 1; display: none;" onclick="deleteTask()">Excluir</button>
            <button class="btn-danger" style="background: #444;" onclick="closeModal()">Cancelar</button>
        </div>
    </div>
</div>

<script>
    const days = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
    
    // Dados iniciais baseados na sua planilha
    const initialRoutine = [
        
        // ... o sistema carregará o restante conforme você interagir
    ];

    let routine = JSON.parse(localStorage.getItem('azdev_routine')) || initialRoutine;

    function render() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        days.forEach((dayName, dayIdx) => {
            const dayTasks = routine.filter(t => t.day == dayIdx).sort((a,b) => a.time.localeCompare(b.time));
            
            const tasksHtml = dayTasks.map(t => {
                // Encontrar o index real no array original para edição
                const realIdx = routine.indexOf(t);
                return `
                    <div class="task-card" onclick="openModal(${realIdx})">
                        <span class="task-time">${t.time}</span>
                        <span class="task-name">${t.task}</span>
                    </div>
                `;
            }).join('');

            grid.innerHTML += `
                <div class="day-column">
                    <div class="day-header">${dayName}</div>
                    <div class="task-container">${tasksHtml}</div>
                </div>
            `;
        });
        localStorage.setItem('azdev_routine', JSON.stringify(routine));
    }

    function openModal(index = null) {
        const modal = document.getElementById('taskModal');
        const delBtn = document.getElementById('deleteBtn');
        modal.style.display = 'flex';

        if (index !== null) {
            document.getElementById('modalTitle').innerText = "Editar Atividade";
            document.getElementById('editIndex').value = index;
            document.getElementById('dayInput').value = routine[index].day;
            document.getElementById('timeInput').value = routine[index].time;
            document.getElementById('taskInput').value = routine[index].task;
            delBtn.style.display = 'block';
        } else {
            document.getElementById('modalTitle').innerText = "Nova Atividade";
            document.getElementById('editIndex').value = "";
            document.getElementById('taskInput').value = "";
            delBtn.style.display = 'none';
        }
    }

    function closeModal() { document.getElementById('taskModal').style.display = 'none'; }

    function saveTask() {
        const idx = document.getElementById('editIndex').value;
        const newTask = {
            day: parseInt(document.getElementById('dayInput').value),
            time: document.getElementById('timeInput').value,
            task: document.getElementById('taskInput').value
        };

        if (!newTask.time || !newTask.task) return alert("Preencha tudo!");

        if (idx !== "") {
            routine[idx] = newTask;
        } else {
            routine.push(newTask);
        }

        render();
        closeModal();
    }

    function deleteTask() {
        const idx = document.getElementById('editIndex').value;
        if (confirm("Remover esta atividade?")) {
            routine.splice(idx, 1);
            render();
            closeModal();
        }
    }

    window.onclick = (event) => { if (event.target == document.getElementById('taskModal')) closeModal(); }

    render();
</script>
</body>
</html>
